<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshafey Labs Logo</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .icon-wrapper {
            width: 150px;
            height: 150px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #e6f0ff 0%, #ffffff 100%);
            border-radius: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0, 74, 153, 0.1);
        }
        .brand-text {
            color: #003366;
            line-height: 1.2;
        }
        .brand-arabic {
            font-size: 42px;
            font-weight: 800;
            margin-bottom: 4px;
            color: #004a99;
        }
        .brand-english {
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: none;
            color: #5588ff;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="icon-wrapper">
            <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="medGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#004a99;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path d="M35 25 C 35 25, 65 40, 65 50 C 65 60, 35 75, 35 75" stroke="url(#medGradient)" stroke-width="8" stroke-linecap="round" fill="none"/>
                <path d="M65 25 C 65 25, 35 40, 35 50 C 35 60, 65 75, 65 75" stroke="#00d4ff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5"/>
                <line x1="38" y1="35" x2="62" y2="35" stroke="#004a99" stroke-width="2" stroke-dasharray="2 4"/>
                <line x1="35" y1="50" x2="65" y2="50" stroke="#004a99" stroke-width="2" stroke-dasharray="2 4"/>
                <line x1="38" y1="65" x2="62" y2="65" stroke="#004a99" stroke-width="2" stroke-dasharray="2 4"/>
                <circle cx="35" cy="25" r="5" fill="#004a99"/>
                <circle cx="65" cy="25" r="5" fill="#00d4ff"/>
                <circle cx="65" cy="50" r="5" fill="#004a99"/>
                <circle cx="35" cy="50" r="5" fill="#00d4ff"/>
                <circle cx="35" cy="75" r="5" fill="#004a99"/>
                <circle cx="65" cy="75" r="5" fill="#00d4ff"/>
            </svg>
        </div>
        <div class="brand-text">
            <div class="brand-arabic">الشافعى لاب</div>
            <div class="brand-english">Elshafey - labs</div>
        </div>
    </div>
</body>
</html>
