<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Post - Elshafey Labs</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f0f5ff;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
        }
        .post-container {
            width: 100%;
            height: 100%;
            background: white;
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 80px;
            box-sizing: border-box;
            background: linear-gradient(135deg, #ffffff 0%, #eef6ff 100%);
        }
        .bg-shape {
            position: absolute;
            z-index: 0;
            background: linear-gradient(135deg, rgba(0, 123, 255, 0.05) 0%, rgba(0, 74, 153, 0.05) 100%);
            border-radius: 50%;
        }
        .shape-1 { width: 600px; height: 600px; top: -100px; right: -100px; }
        .shape-2 { width: 400px; height: 400px; bottom: -50px; left: -50px; }

        .content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .logo-small {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            margin-right: 15px;
        }

        .logo-text {
            color: #003366;
            text-align: left;
        }

        .logo-arabic { font-size: 24px; font-weight: 800; }
        .logo-english { font-size: 14px; letter-spacing: 1px; font-weight: 600; color: #5588ff; }

        .main-visual {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .visual-circle {
            width: 500px;
            height: 500px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 30px 60px rgba(0, 74, 153, 0.1);
            border: 8px solid #ffffff;
        }

        .visual-icon {
            width: 300px;
            height: 300px;
        }

        .text-overlay {
            margin-top: 40px;
            text-align: center;
        }

        .headline {
            font-size: 64px;
            font-weight: 800;
            color: #004a99;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .subheadline {
            font-size: 28px;
            color: #556677;
            font-weight: 400;
            max-width: 800px;
            margin: 0 auto 40px;
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: auto;
        }

        .badge {
            background: white;
            padding: 15px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            font-weight: 600;
            color: #004a99;
            border: 1px solid rgba(0, 74, 153, 0.1);
        }

        .badge svg {
            margin-right: 10px;
            color: #28a745;
        }
    </style>
</head>
<body>
    <div class="post-container">
        <div class="bg-shape shape-1"></div>
        <div class="bg-shape shape-2"></div>

        <div class="content">
            <div class="header">
                <div class="logo-small">
                    <svg class="logo-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M35 25 C 35 25, 65 40, 65 50 C 65 60, 35 75, 35 75" stroke="#004a99" stroke-width="8" stroke-linecap="round" fill="none"/>
                        <path d="M65 25 C 65 25, 35 40, 35 50 C 35 60, 65 75, 65 75" stroke="#00d4ff" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.5"/>
                    </svg>
                    <div class="logo-text">
                        <div class="logo-arabic">الشافعى لاب</div>
                        <div class="logo-english">Elshafey - labs</div>
                    </div>
                </div>
                <div class="badge">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
                    Certified Quality
                </div>
            </div>

            <div class="main-visual">
                <div class="visual-circle">
                    <svg class="visual-icon" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" style="stop-color:#007bff;stop-opacity:1" />
                                <stop offset="100%" style="stop-color:#004a99;stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <path d="M35 25 C 35 25, 65 40, 65 50 C 65 60, 35 75, 35 75" stroke="url(#mainGrad)" stroke-width="6" stroke-linecap="round" fill="none"/>
                        <path d="M65 25 C 65 25, 35 40, 35 50 C 35 60, 65 75, 65 75" stroke="#00d4ff" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.4"/>
                        <line x1="38" y1="35" x2="62" y2="35" stroke="#004a99" stroke-width="1.5" stroke-dasharray="2 3"/>
                        <line x1="35" y1="50" x2="65" y2="50" stroke="#004a99" stroke-width="1.5" stroke-dasharray="2 3"/>
                        <line x1="38" y1="65" x2="62" y2="65" stroke="#004a99" stroke-width="1.5" stroke-dasharray="2 3"/>
                        <circle cx="35" cy="25" r="4" fill="#004a99"/>
                        <circle cx="65" cy="25" r="4" fill="#00d4ff"/>
                        <circle cx="65" cy="50" r="4" fill="#004a99"/>
                        <circle cx="35" cy="50" r="4" fill="#00d4ff"/>
                        <circle cx="35" cy="75" r="4" fill="#004a99"/>
                        <circle cx="65" cy="75" r="4" fill="#00d4ff"/>
                    </svg>
                </div>
            </div>

            <div class="text-overlay">
                <div class="headline">Accurate Results<br>You Can Trust</div>
                <div class="subheadline">Fast lab tests with certified quality and modern diagnostic technology for your health and safety.</div>
            </div>

            <div class="footer">
                <div class="badge">Professional Diagnostics</div>
                <div class="badge">Modern Equipment</div>
            </div>
        </div>
    </div>
</body>
</html>
