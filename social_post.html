<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Post - Elshafey Labs</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #00a8e8;
            --dark-blue: #003366;
            --white: #ffffff;
            --gray: #f0f4f8;
            --accent-green: #28a745;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ccc;
            font-family: 'Montserrat', sans-serif;
        }

        .post-container {
            width: 1080px;
            height: 1080px;
            background-color: var(--white);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.2);
        }

        /* Abstract Background Elements */
        .bg-shape {
            position: absolute;
            background: linear-gradient(135deg, rgba(0, 86, 179, 0.05) 0%, rgba(0, 168, 232, 0.05) 100%);
            border-radius: 50%;
            z-index: 1;
        }

        .shape-1 { width: 800px; height: 800px; top: -200px; right: -200px; }
        .shape-2 { width: 600px; height: 600px; bottom: -150px; left: -150px; }

        .content {
            position: relative;
            z-index: 10;
            padding: 80px;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo-small {
            display: flex;
            align-items: center;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            margin-right: 15px;
        }

        .logo-text-ar {
            font-family: 'Cairo', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary-blue);
            margin: 0;
        }

        .logo-text-en {
            font-size: 16px;
            font-weight: 700;
            color: var(--dark-blue);
            margin: 0;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
        }

        .badge {
            background-color: var(--light-blue);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .headline {
            font-size: 82px;
            font-weight: 700;
            color: var(--dark-blue);
            line-height: 1.1;
            margin: 0 0 30px 0;
            max-width: 800px;
        }

        .subheadline {
            font-size: 36px;
            color: #555;
            line-height: 1.4;
            margin: 0 0 50px 0;
            max-width: 700px;
            border-left: 8px solid var(--primary-blue);
            padding-left: 30px;
        }

        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            border-top: 2px solid var(--gray);
            padding-top: 40px;
        }

        .contact-info {
            display: flex;
            gap: 40px;
        }

        .contact-item {
            display: flex;
            flex-direction: column;
        }

        .contact-label {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .contact-value {
            font-size: 20px;
            color: var(--dark-blue);
            font-weight: 700;
        }

        .cta-button {
            background-color: var(--primary-blue);
            color: var(--white);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.2);
        }

        .image-placeholder {
            position: absolute;
            right: -100px;
            bottom: 100px;
            width: 600px;
            height: 600px;
            background: linear-gradient(45deg, var(--gray), var(--white));
            border-radius: 50%;
            border: 20px solid var(--white);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .microscope-svg {
            width: 400px;
            height: 400px;
            opacity: 0.1;
            filter: drop-shadow(0 0 10px rgba(0, 86, 179, 0.2));
        }

        .helix-small {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
        }
    </style>
</head>
<body>

<div class="post-container" id="post">
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <div class="image-placeholder">
        <svg class="microscope-svg" viewBox="0 0 64 64" fill="var(--primary-blue)">
            <path d="M54,56H10c-1.1,0-2,0.9-2,2s0.9,2,2,2h44c1.1,0,2-0.9,2-2S55.1,56,54,56z"/>
            <path d="M46,48H18c-1.1,0-2,0.9-2,2v2h32v-2C48,48.9,47.1,48,46,48z"/>
            <path d="M38,40H26c-1.1,0-2,0.9-2,2v4h16v-4C40,40.9,39.1,40,38,40z"/>
            <path d="M32,4c-6.6,0-12,5.4-12,12v4h4v-4c0-4.4,3.6-8,8-8s8,3.6,8,8v16.1c-1.2,0.5-2.2,1.5-2.7,2.7l-3.3,7.4l3.7,1.6l3.3-7.4c0.1-0.2,0.2-0.3,0.4-0.4V16C44,9.4,38.6,4,32,4z"/>
            <path d="M34,22h-4c-1.1,0-2,0.9-2,2v10c0,1.1,0.9,2,2,2h4c1.1,0,2-0.9,2-2V24C36,22.9,35.1,22,34,22z"/>
        </svg>
    </div>

    <div class="content">
        <div class="header">
            <div class="logo-small">
                <svg class="logo-icon" viewBox="0 0 100 100">
                    <path class="helix-small" style="stroke: var(--primary-blue);" d="M30,20 C50,20 50,80 70,80" />
                    <path class="helix-small" style="stroke: var(--light-blue);" d="M30,80 C50,80 50,20 70,20" />
                    <circle fill="var(--primary-blue)" cx="30" cy="20" r="5" />
                    <circle fill="var(--light-blue)" cx="30" cy="80" r="5" />
                    <circle fill="var(--primary-blue)" cx="70" cy="80" r="5" />
                    <circle fill="var(--light-blue)" cx="70" cy="20" r="5" />
                </svg>
                <div>
                    <div class="logo-text-ar">الشافعى لاب</div>
                    <div class="logo-text-en">ELSHAFEY LABS</div>
                </div>
            </div>
        </div>

        <div class="main-content">
            <div class="badge">Certified Laboratory</div>
            <h1 class="headline">Accurate Results <br>You Can Trust</h1>
            <p class="subheadline">Fast lab tests with certified quality and advanced technology.</p>
            <a href="#" class="cta-button">Book Your Test Now</a>
        </div>

        <div class="footer">
            <div class="contact-info">
                <div class="contact-item">
                    <span class="contact-label">Call Us</span>
                    <span class="contact-value">19xxx / 01x xxxx xxxx</span>
                </div>
                <div class="contact-item">
                    <span class="contact-label">Location</span>
                    <span class="contact-value">Cairo, Egypt</span>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
