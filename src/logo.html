<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshafey Labs Logo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #004a99;
            --secondary-blue: #00aaff;
            --light-blue: #e6f2ff;
            --white: #ffffff;
            --text-dark: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
            background: var(--white);
            border-radius: 20px;
            text-align: center;
        }

        .icon-wrapper {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, var(--primary-blue), var(--secondary-blue));
            border-radius: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0, 74, 153, 0.2);
        }

        .dna-icon {
            width: 80px;
            height: 80px;
            fill: var(--white);
        }

        .text-container {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .brand-arabic {
            font-family: 'Cairo', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: var(--primary-blue);
            line-height: 1.2;
            margin: 0;
        }

        .brand-english {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 400;
            letter-spacing: 2px;
            color: var(--secondary-blue);
            text-transform: uppercase;
            margin: 0;
        }

        .divider {
            width: 60px;
            height: 4px;
            background: linear-gradient(to right, var(--primary-blue), var(--secondary-blue));
            margin: 15px auto;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <div class="logo-container" id="logo">
        <div class="icon-wrapper">
            <!-- DNA Helix SVG -->

        </div>
        <div class="text-container">
            <h1 class="brand-arabic">الشافعى لاب</h1>

            <h2 class="brand-english">Elshafey labs</h2>
        </div>
    </div>
</body>
</html>
