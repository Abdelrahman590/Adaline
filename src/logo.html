<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshafey Labs Logo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: transparent;
            font-family: 'Montserrat', 'Cairo', sans-serif;
        }
        .logo-container {
            display: flex;
            align-items: center;
            background: white;
            padding: 40px;
            border-radius: 20px;
            /* box-shadow: 0 10px 30px rgba(0,0,0,0.05); */
        }
        .icon-container {
            width: 100px;
            height: 100px;
            margin-left: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0052D4, #4364F7, #6FB1FC);
            border-radius: 24%;
            padding: 15px;
        }
        .dna-icon {
            width: 100%;
            height: 100%;
            fill: white;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            text-align: right;
        }
        .brand-name-ar {
            font-family: 'Cairo', sans-serif;
            font-size: 42px;
            font-weight: 700;
            color: #1a2a6c;
            margin: 0;
            line-height: 1.2;
        }
        .brand-name-en {
            font-size: 24px;
            font-weight: 400;
            color: #4364F7;
            margin: 0;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <div class="text-container">
            <h1 class="brand-name-ar">الشافعى لاب</h1>
            <h2 class="brand-name-en">Elshafey Labs</h2>
        </div>
        <div class="icon-container">
            <svg class="dna-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M16.94 6.94C15.65 8.23 13.73 9 12 9c-1.73 0-3.65-.77-4.94-2.06l-1.42 1.42C7.07 9.79 9.38 11 12 11c2.62 0 4.93-1.21 6.36-2.64l-1.42-1.42M12 13c-2.62 0-4.93 1.21-6.36 2.64l1.42 1.42C8.35 15.77 10.27 15 12 15c1.73 0 3.65.77 4.94 2.06l1.42-1.42C16.93 14.21 14.62 13 12 13m4.94-9.06L18.36 2.52C16.71.87 14.47 0 12 0 9.53 0 7.29.87 5.64 2.52L7.06 3.94C8.35 2.65 10.27 2 12 2c1.73 0 3.65.77 4.94 2.06M7.06 20.06L5.64 21.48C7.29 23.13 9.53 24 12 24s4.71-.87 6.36-2.52l-1.42-1.42C15.65 21.35 13.73 22 12 22s-3.65-.77-4.94-2.06z"/>
                <circle cx="12" cy="12" r="2"/>
            </svg>
        </div>
    </div>
</body>
</html>
