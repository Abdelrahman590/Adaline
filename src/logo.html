<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshafey Labs Logo</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #e6f0ff;
            --accent-blue: #00a8e8;
            --text-dark: #333;
        }
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 400px;
            width: 800px;
            background-color: transparent;
            font-family: 'Montserrat', sans-serif;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
            background: white;
            padding: 40px 60px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .icon-container {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-blue));
            border-radius: 18px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 8px 20px rgba(0, 86, 179, 0.3);
        }
        .dna-icon {
            width: 50px;
            height: 50px;
            fill: white;
        }
        .text-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .brand-arabic {
            font-family: 'Cairo', sans-serif;
            font-weight: 700;
            font-size: 36px;
            color: var(--primary-blue);
            margin: 0;
            line-height: 1.2;
            direction: rtl;
        }
        .brand-english {
            font-weight: 700;
            font-size: 28px;
            color: var(--text-dark);
            margin: 0;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .tagline {
            font-size: 14px;
            color: #666;
            margin-top: 4px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
    </style>
</head>
