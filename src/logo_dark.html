<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshafey Labs Logo - Dark</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #00a8e8;
            --light-blue: #00d4ff;
            --text-color: #ffffff;
            --bg-color: #0f172a;
        }
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 800px;
            width: 800px;
            background-color: var(--bg-color);
            font-family: 'Montserrat', sans-serif;
        }
        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        .icon-container {
            width: 160px;
            height: 160px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, #0056b3, #00a8e8);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 15px 40px rgba(0, 168, 232, 0.2);
        }
        .dna-icon {
            width: 90px;
            height: 90px;
            fill: white;
        }
        .brand-name {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .name-arabic {
            font-family: 'Cairo', sans-serif;
            font-size: 56px;
            font-weight: 700;
            color: white;
            margin: 0;
            line-height: 1.1;
        }
        .name-english {
            font-size: 36px;
            font-weight: 400;
            letter-spacing: 3px;
            color: var(--primary-blue);
            margin-top: 5px;
            text-transform: uppercase;
        }
    </style>
</head>
