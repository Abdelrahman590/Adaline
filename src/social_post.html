<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshafey Labs Social Media Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #00a8e8;
            --accent-green: #10b981;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1080px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f8fafc;
            font-family: 'Montserrat', sans-serif;
        }
        .post-container {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top right, #e0f2fe, #ffffff);
            display: flex;
            flex-direction: column;
            padding: 60px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        /* Background elements */
        .bg-circle {
            position: absolute;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(0, 86, 179, 0.05), rgba(0, 168, 232, 0.05));
            top: -100px;
            right: -100px;
            z-index: 0;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
            margin-bottom: 80px;
        }
        .logo-small {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-blue), var(--light-blue));
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-icon svg {
            width: 35px;
            height: 35px;
            fill: white;
        }
        .logo-text {
            display: flex;
            flex-direction: column;
        }
        .logo-text .ar { font-family: 'Cairo', sans-serif; font-size: 24px; font-weight: 700; color: var(--primary-blue); line-height: 1; }
        .logo-text .en { font-size: 16px; font-weight: 600; color: var(--text-dark); letter-spacing: 1px; text-transform: uppercase; }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 10;
        }
        .headline {
            font-size: 72px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.1;
            margin-bottom: 24px;
            max-width: 800px;
        }
        .subheadline {
            font-size: 32px;
            color: var(--text-light);
            line-height: 1.4;
            margin-bottom: 48px;
            max-width: 700px;
        }
        .cta-section {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        .btn {
            padding: 20px 40px;
            background-color: var(--primary-blue);
            color: white;
            font-size: 24px;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 10px 20px rgba(0, 86, 179, 0.2);
        }

        .visual-element {
            position: absolute;
            bottom: 60px;
            right: 60px;
            width: 450px;
            height: 450px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.08);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .visual-element img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* Placeholder for a professional medical image */
        .image-placeholder {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: var(--primary-blue);
        }
        .dna-large {
            width: 200px;
            height: 200px;
            opacity: 0.2;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            z-index: 10;
        }
        .contact-info {
            display: flex;
            gap: 30px;
        }
        .contact-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-light);
            font-size: 18px;
        }
        .badge {
            display: flex;
            align-items: center;
            gap: 8px;
            background-color: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 18px;
        }
    </style>
</head>

                ISO Certified Quality

        </div>

</html>
