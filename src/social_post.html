<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elshafey Labs Social Media Post</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #0056b3;
            --accent-blue: #00a8e8;
            --bg-light: #f4f7f6;
            --text-dark: #2c3e50;
            --white: #ffffff;
        }
        body {
            margin: 0;
            padding: 0;
            width: 1080px;
            height: 1080px;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .post-container {
            width: 1080px;
            height: 1080px;
            background: radial-gradient(circle at top right, #ffffff, #e6f0ff);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 80px;
            box-sizing: border-box;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-small {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logo-icon {
            width: 50px;
            height: 50px;
            background: var(--primary-blue);
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-icon svg {
            width: 30px;
            height: 30px;
            fill: white;
        }
        .logo-text {
            font-weight: 700;
            font-size: 24px;
            color: var(--primary-blue);
        }
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
        }
        .headline {
            font-size: 72px;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.1;
            margin-bottom: 30px;
            max-width: 800px;
        }
        .subheadline {
            font-size: 32px;
            color: #555;
            line-height: 1.4;
            max-width: 600px;
            border-left: 6px solid var(--accent-blue);
            padding-left: 30px;
        }
        .visual-element {
            position: absolute;
            right: -50px;
            bottom: 100px;
            width: 600px;
            height: 600px;
            opacity: 0.1;
            z-index: 1;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .cta-button {
            background: linear-gradient(135deg, var(--primary-blue), var(--accent-blue));
            color: white;
            padding: 20px 45px;
            border-radius: 50px;
            font-size: 24px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(0, 86, 179, 0.3);
        }
        .contact-info {
            text-align: right;
            color: var(--primary-blue);
            font-weight: 600;
            font-size: 20px;
        }
        .floating-circles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .circle {
            position: absolute;
            border-radius: 50%;
            background: var(--accent-blue);
            opacity: 0.05;
        }
        .c1 { width: 400px; height: 400px; top: -100px; right: -100px; }
        .c2 { width: 200px; height: 200px; bottom: 200px; left: -50px; }
    </style>
</head>

        </div>

</body>
